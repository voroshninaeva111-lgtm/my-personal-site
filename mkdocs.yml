site_name: Ева Ворошнина
site_description: Персональный сайт-портфолио
site_author: Ева Ворошнина
site_url: https://example.com/
use_directory_urls: false

theme:
  name: material
  language: ru
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
  palette:
    - scheme: default
      primary: light blue
      accent: blue

nav:
  - Главная: index.md
  - О себе: about.md
  - Проекты: projects.md
  - Контакты: contacts.md
  - Резюме: resume.md
  - Достижения: achievements.md

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/telegram
      link: https://t.me/yourusername
    - icon: fontawesome/brands/github
      link: https://github.com/yourusername

copyright: "© 2026 Ева Ворошнина"
